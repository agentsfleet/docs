<?xml version="1.0" encoding="UTF-8"?>
<!--
  usezombie wordmark — dark-mode variant.

  Shown when GitHub / Mintlify renders the README on a dark canvas.
  Wordmark text uses the dark-mode --text token (#E6EAEC); the pulse
  disc carries the brand --pulse currency (#5EEAD4). Mono face is
  Commit Mono with broad fallback to JetBrains Mono / ui-monospace
  so the wordmark stays legible even when the brand woff2 hasn't
  loaded.
-->
<svg width="200" height="32" viewBox="0 0 200 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="10" cy="16" r="6" fill="#5EEAD4" />
  <text x="26" y="22"
    font-family="'Commit Mono','JetBrains Mono','SF Mono',ui-monospace,monospace"
    font-size="16"
    font-weight="500"
    letter-spacing="-0.3"
    fill="#E6EAEC">usezombie</text>
</svg>
